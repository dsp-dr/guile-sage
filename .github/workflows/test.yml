name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Guile
      run: |
        sudo apt-get update
        sudo apt-get install -y guile-3.0

    - name: Run linter
      run: make lint

  test:
    runs-on: ubuntu-latest
    needs: lint
    env:
      # CI runs the full suite in YOLO so write/edit/git tools execute.
      # test-security.scm explicitly unsets YOLO for its denial cases.
      SAGE_YOLO_MODE: "1"

    steps:
    - uses: actions/checkout@v4

    - name: Install Guile
      run: |
        sudo apt-get update
        sudo apt-get install -y guile-3.0

    - name: Run full test suite
      run: make check

    - name: Run property-based tests
      run: guile -L src tests/test-pbt.scm

    - name: Test summary
      if: always()
      run: |
        echo "## Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        make check 2>&1 | grep -E "^(Running|Total:|Pass Rate|Tests:|All tests passed)" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
