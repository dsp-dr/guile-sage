name: Release

# Cut a GitHub release when a vX.Y.Z tag is pushed. Tests gate the release.
# The network-chaos suite (toxiproxy) runs ONLY for minor releases (vX.Y.0)
# per docs/CHAOS-TOXIPROXY-SPEC.org, and is advisory (continue-on-error) until
# the CI toxiproxy + mock-backend wiring is hardened.
on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SAGE_YOLO_MODE: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Install Guile
        run: |
          sudo apt-get update
          sudo apt-get install -y guile-3.0
      - name: Lint
        run: make lint
      - name: Full test suite
        run: make check

  # Advisory: only for minor releases (tag ends in .0). Patch releases skip it.
  chaos-net:
    runs-on: ubuntu-latest
    needs: test
    if: endsWith(github.ref_name, '.0')
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install Guile + tmux
        run: |
          sudo apt-get update
          sudo apt-get install -y guile-3.0 tmux
      - name: Install toxiproxy
        run: |
          curl -fsSL -o /tmp/toxiproxy.deb \
            https://github.com/Shopify/toxiproxy/releases/download/v2.12.0/toxiproxy_2.12.0_linux_amd64.deb || exit 0
          sudo dpkg -i /tmp/toxiproxy.deb || true
      - name: Network chaos suite (advisory)
        run: gmake chaos-net || make chaos-net || true

  release:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "guile-sage ${{ github.ref_name }}" \
            --generate-notes
