# InspIRCd minimal config for sage agent message queue
# Copy to /usr/local/etc/inspircd/inspircd.conf

# Server identity
<server
    name="host.lan"
    description="Sage Agent Message Queue"
    id="00A"
    network="SageNet">

# Admin info
<admin
    name="sage"
    nick="sage-admin"
    email="sage@host.lan">

# Bind to localhost only (secure for local agent use)
<bind
    address="127.0.0.1"
    port="6667"
    type="clients">

# Also bind to LAN interface if needed
<bind
    address="0.0.0.0"
    port="6667"
    type="clients">

# Paths
<path
    configdir="/usr/local/etc/inspircd"
    datadir="/var/db/inspircd"
    logdir="/var/log/inspircd"
    moduledir="/usr/local/libexec/inspircd/modules"
    runtimedir="/var/run/inspircd">

# Logging
<log
    method="file"
    type="* -USERINPUT -USEROUTPUT"
    level="default"
    target="/var/log/inspircd/inspircd.log">

# Default connection class - allow local connections
<connect
    name="local"
    allow="127.0.0.0/8"
    maxchans="20"
    limit="100">

<connect
    name="lan"
    allow="*"
    maxchans="20"
    limit="100">

# Operator account (optional, for admin)
<oper
    name="admin"
    password="sageirc"
    host="*@127.0.0.1 *@host.lan *@*.lan"
    type="NetAdmin">

<type
    name="NetAdmin"
    classes="ServerLink BanControl OperChat HostCloak">

<class
    name="ServerLink"
    commands="CONNECT SQUIT RCONNECT RSQUIT MKPASSWD ALLTIME">

<class
    name="BanControl"
    commands="KILL GLINE KLINE ZLINE QLINE ELINE TLINE RLINE CHECK NICKLOCK NICKUNLOCK SHUN CLONES CBAN">

<class
    name="OperChat"
    commands="WALLOPS GLOBOPS">

<class
    name="HostCloak"
    commands="SETHOST SETIDENT CHGHOST CHGIDENT CHGNAME SETIDLE">

# Limits
<limits
    maxnick="31"
    maxchan="64"
    maxmodes="20"
    maxident="11"
    maxquit="255"
    maxtopic="307"
    maxkick="255"
    maxreal="128"
    maxaway="200">

# Performance
<performance
    netbuffersize="10240"
    somaxconn="128"
    softlimit="12800">

# Security
<security
    announceinvites="dynamic"
    hidemodes="eI"
    hideulines="no"
    flatlinks="no"
    hideserver=""
    hidebans="no"
    hidekills=""
    hidesplits="no"
    maxtargets="20"
    customversion=""
    operspywhois="no"
    runasuser="ircd"
    runasgroup="ircd"
    userstats="Pu">

# Options
<options
    prefixquit="Quit: "
    suffixquit=""
    prefixpart="&quot;"
    suffixpart="&quot;"
    fixedquit=""
    fixedpart=""
    xlinequit="%fulltype%: %reason%"
    moronbanner="Error: Access denied."
    exemptchanops="nonick:v flood:o"
    defaultmodes="nt">

# Ping settings
<ping
    timeout="120"
    frequency="30">

# MOTD (Message of the Day)
<files motd="/usr/local/etc/inspircd/motd.txt">

# No extra modules - using core functionality only
